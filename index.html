<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Audio Stream</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; text-align: center; }
        input { padding: 8px; width: 80%; margin: 5px; }
        button { padding: 12px 30px; font-size: 18px; }
        #status { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🎤 Слушаем ESP32</h1>
    <div>
        <label>IP-адрес ESP32:</label>
        <input type="text" id="ipInput" placeholder="192.168.1.42">
    </div>
    <div>
        <label>Порт WebSocket:</label>
        <input type="text" id="portInput" placeholder="81" value="81">
    </div>
    <button id="connectBtn">▶ Подключиться и слушать</button>
    <p id="status">Статус: не подключено</p>

    <script>
        let audioCtx = null;
        let ws = null;
        let connected = false;

        // Загрузка сохранённых настроек
        const savedIp = localStorage.getItem('esp32_ip');
        const savedPort = localStorage.getItem('esp32_port');
        if (savedIp) document.getElementById('ipInput').value = savedIp;
        if (savedPort) document.getElementById('portInput').value = savedPort;

        document.getElementById('connectBtn').addEventListener('click', () => {
            if (!connected) {
                startStream();
            } else {
                stopStream();
            }
        });

        async function startStream() {
            const ip = document.getElementById('ipInput').value.trim();
            const port = document.getElementById('portInput').value.trim() || '81';

            if (!ip) {
                alert('Введите IP-адрес ESP32');
                return;
            }

            // Сохраняем настройки
            localStorage.setItem('esp32_ip', ip);
            localStorage.setItem('esp32_port', port);

            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                ws = new WebSocket(`ws://${ip}:${port}/`);

                document.getElementById('status').textContent = 'Статус: подключение...';
                ws.binaryType = 'arraybuffer';

                ws.onopen = () => {
                    connected = true;
                    document.getElementById('status').textContent = 'Статус: слушаем';
                    document.getElementById('connectBtn').textContent = '⏹ Отключиться';
                };

                ws.onmessage = (event) => {
                    if (!audioCtx) return;
                    const rawData = new Int32Array(event.data);
                    const numFrames = rawData.length;
                    const audioBuffer = audioCtx.createBuffer(1, numFrames, 16000);
                    const channel = audioBuffer.getChannelData(0);
                    for (let i = 0; i < numFrames; i++) {
                        channel[i] = rawData[i] / 2147483648; // нормализация
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioCtx.destination);
                    source.start();
                };

                ws.onerror = (err) => {
                    stopStream();
                    document.getElementById('status').textContent = 'Ошибка WebSocket';
                };

                ws.onclose = () => {
                    stopStream();
                    document.getElementById('status').textContent = 'Статус: соединение закрыто';
                };
            } catch (e) {
                document.getElementById('status').textContent = 'Ошибка: ' + e.message;
                stopStream();
            }
        }

        function stopStream() {
            if (ws) {
                ws.close();
                ws = null;
            }
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            connected = false;
            document.getElementById('connectBtn').textContent = '▶ Подключиться и слушать';
            document.getElementById('status').textContent = 'Статус: не подключено';
        }
    </script>
</body>
</html>
